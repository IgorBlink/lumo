<!-- Lumo · Icon · Moon + Prompt -->
<!--
  Dark moon disc. Silver L, geometrically centered in the circle.
  Glowing cursor bar — same width as the L foot — below it.
  Two colours. Nothing else.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="moon" cx="38%" cy="32%" r="70%">
      <stop offset="0%"   stop-color="#13172b"/>
      <stop offset="100%" stop-color="#080b18"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-80%" width="180%" height="360%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Moon disc -->
  <circle cx="50" cy="50" r="47" fill="url(#moon)"/>
  <circle cx="50" cy="50" r="47" fill="none" stroke="#1e2540" stroke-width="1"/>

  <!--
    L + cursor bounding box: 44w × 57h, centered at (50, 50).
    x_start = 28, y_start = 22.
  -->

  <!-- L vertical stroke: x=28, y=22, 12×46 -->
  <rect x="28" y="22" width="12" height="46" rx="3.5" fill="#c9d8f0"/>
  <!-- L horizontal stroke: x=28, y=56, 44×12 -->
  <rect x="28" y="56" width="44" height="12" rx="3.5" fill="#c9d8f0"/>

  <!-- Cursor bar: same width as L foot, 5px gap below L -->
  <rect x="28" y="73" width="44" height="6" rx="3" fill="#7eb8f7" filter="url(#glow)"/>
</svg>
